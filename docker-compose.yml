version: '3.8'

services:
  # ── 데이터베이스 ──────────────────────────────
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-user-data:/var/lib/mysql
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-concert:
    image: mysql:8.0
    container_name: mysql-concert
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: concert_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-concert-data:/var/lib/mysql
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-reservation:
    image: mysql:8.0
    container_name: mysql-reservation
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: reservation_db
    ports:
      - "3309:3306"
    volumes:
      - mysql-reservation-data:/var/lib/mysql
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ticketing-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - ticketing-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── 애플리케이션 서비스 ────────────────────────
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-user:3306/user_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
      JWT_SECRET: ticketnow-secret-key-for-jwt-signing-2024
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-test_sk_placeholder}
    depends_on:
      mysql-user:
        condition: service_healthy
    networks:
      - ticketing-net

  concert-service:
    build: ./concert-service
    container_name: concert-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-concert:3306/concert_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql-concert:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticketing-net

  reservation-service:
    build: ./reservation-service
    # container_name 제거 → docker-compose up --scale reservation-service=3 으로 수평 확장 가능
    # 외부 포트 미노출 — api-gateway가 내부 네트워크로 라운드로빈
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-reservation:3306/reservation_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1234
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ticketnow-secret-key-for-jwt-signing-2024
      CONCERT_SERVICE_URL: http://concert-service:8082
    depends_on:
      mysql-reservation:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketing-net

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ticketing-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ticketnow-secret-key-for-jwt-signing-2024
      USER_SERVICE_URL: http://user-service:8081
      CONCERT_SERVICE_URL: http://concert-service:8082
      RESERVATION_SERVICE_URL: http://reservation-service:8083
    depends_on:
      - user-service
      - concert-service
      - reservation-service
    networks:
      - ticketing-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - ticketing-net

# ── 볼륨 ──────────────────────────────────────
volumes:
  mysql-user-data:
  mysql-concert-data:
  mysql-reservation-data:
  redis-data:

# ── 네트워크 ───────────────────────────────────
networks:
  ticketing-net:
    driver: bridge
